<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header class="glass-header">
            <h1>Creative Works</h1>
            <p>Photography & Design</p>
        </header>

        <section class="glass-grid">
            <div class="glass-card">
                <h3>Project Alpha</h3>
                <p>Cinematic street photography.</p>
            </div>
            <div class="glass-card">
                <h3>Project Beta</h3>
                <p>Advanced culinary techniques.</p>
            </div>
            <div class="glass-card">
                <h3>Project Gamma</h3>
                <p>Hardware & electronics.</p>
            </div>
        </section>
    </main>

</body>
</html>
