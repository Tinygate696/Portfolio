<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography & Culinary Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="site-header">
        <h1>Selected Works</h1>
        <p>Photography & Culinary Arts</p>
    </header>

    <main class="portfolio-grid">
        <!-- Portfolio Item 1 -->
        <article class="portfolio-item">
            <div class="image-wrapper">
                <img src="images/your-photo-1.jpg" alt="Cinematic street photography">
            </div>
            <div class="item-text">
                <h2>Night Walk</h2>
                <p>Cinematic street photography.</p>
            </div>
        </article>

        <!-- Portfolio Item 2 -->
        <article class="portfolio-item">
            <div class="image-wrapper">
                <img src="images/your-photo-2.jpg" alt="Sourdough crumb structure">
            </div>
            <div class="item-text">
                <h2>The Perfect Bake</h2>
                <p>Advanced dough fermentation.</p>
            </div>
        </article>

        <!-- Portfolio Item 3 -->
        <article class="portfolio-item">
            <div class="image-wrapper">
                <img src="images/your-photo-3.jpg" alt="Macro hardware components">
            </div>
            <div class="item-text">
                <h2>Hardware Setup</h2>
                <p>Custom audio setups and electronics.</p>
            </div>
        </article>
    </main>

</body>
</html>
