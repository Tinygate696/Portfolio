<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Glass Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="liquid-bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="glass-container">
        <header class="glass-header">
            <h1>Creative Works</h1>
            <p>Photography & Design</p>
        </header>

                <section class="glass-grid">
            <div class="glass-card">
                <img src="IMG_0373.jpg" alt="Cinematic street photography" class="card-img">
                <h3>Night Walk</h3>
                <p>Cinematic street photography and urban landscapes.</p>
            </div>
            
            <div class="glass-card">
                <img src="IMG_8017.jpg" alt="Bangkok Road" class="card-img">
                <h3>The Cool Day</h3>
                <p>Bangkok's Unexpected Cold Days December, 2024.</p>
            </div>

                    <div class="glass-card">
                <img src="IMG_9342.jpg" alt="All Blue" class="card-img">
                <h3>Sky wondering Why</h3>
                <p>I was hoping my life was movie that I script.</p>
            </div>
                    
            <div class="glass-card">
                <img src="IMG_8503.jpg" alt="Life Shift" class="card-img">
                <h3>Life Goes on.</h3>
                <p>Everything ends, begin again.</p>
            </div>
        </section>

    </main>

</body>
</html>
